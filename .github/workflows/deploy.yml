name: Deploy

# Trunk-based: every merge to main flows through the environments in order.
# dev deploys automatically; qa/staging/production are gated by the required
# reviewers configured on each GitHub Environment (Settings > Environments).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for AWS OIDC
  contents: read
  pull-requests: read # to resolve the PR number behind the merge commit

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------------
  # Compute the semantic version (GitVersion, trunk-based) and the PR number of
  # the merge commit. Both are passed down to every environment.
  # ----------------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.gitversion.outputs.majorMinorPatch }}
      pr: ${{ steps.pr.outputs.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GitVersion needs the full history

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          num=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number // empty' 2>/dev/null || true)
          echo "number=${num:-0}" >> "$GITHUB_OUTPUT"
          echo "Resolved PR number: ${num:-0}"

  deploy-dev:
    needs: version
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: dev
      channel: alpha
      include_pr: true
      semver: ${{ needs.version.outputs.semver }}
      pr_number: ${{ needs.version.outputs.pr }}
    secrets: inherit

  deploy-qa:
    needs: [version, deploy-dev]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: qa
      channel: alpha
      include_pr: true
      semver: ${{ needs.version.outputs.semver }}
      pr_number: ${{ needs.version.outputs.pr }}
    secrets: inherit

  deploy-staging:
    needs: [version, deploy-qa]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: staging
      channel: beta
      include_pr: true
      semver: ${{ needs.version.outputs.semver }}
      pr_number: ${{ needs.version.outputs.pr }}
    secrets: inherit

  deploy-production:
    needs: [version, deploy-staging]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: production
      channel: stable
      include_pr: false
      semver: ${{ needs.version.outputs.semver }}
      pr_number: ${{ needs.version.outputs.pr }}
    secrets: inherit

  # ----------------------------------------------------------------------------
  # Tag the released version on the merge commit. This is what lets the version
  # advance: GitVersion computes the next version RELATIVE TO the most recent
  # vX.Y.Z tag, so without this step every build re-anchors to next-version and
  # the patch never increments (1.0.0, 1.0.0, 1.0.0...). With it, the next [FIX]
  # merge bumps to 1.0.3, the one after to 1.0.4, and so on.
  tag-release:
    needs: [version, deploy-production]
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push the tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push version tag
        env:
          SEMVER: ${{ needs.version.outputs.semver }}
        run: |
          tag="v${SEMVER}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $SEMVER"
          git push origin "$tag"
          echo "Pushed tag $tag"
