name: Deploy

# Trunk-based: every merge to main flows through the environments in order.
# dev deploys automatically; qa/staging/production are gated by the required
# reviewers configured on each GitHub Environment (Settings > Environments).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for AWS OIDC
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------------
  # Compute the semantic version (GitVersion, trunk-based). It is passed down to
  # every environment.
  # ----------------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.gitversion.outputs.majorMinorPatch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GitVersion needs the full history

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '5.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

  deploy-dev:
    needs: version
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: dev
      channel: alpha
      semver: ${{ needs.version.outputs.semver }}
    secrets: inherit

  deploy-qa:
    needs: [version, deploy-dev]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: qa
      channel: alpha
      semver: ${{ needs.version.outputs.semver }}
    secrets: inherit

  deploy-staging:
    needs: [version, deploy-qa]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: staging
      channel: beta
      semver: ${{ needs.version.outputs.semver }}
    secrets: inherit

  deploy-production:
    needs: [version, deploy-staging]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: production
      channel: stable
      semver: ${{ needs.version.outputs.semver }}
    secrets: inherit
