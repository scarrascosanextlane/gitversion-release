name: Deploy

# Trunk-based: every merge to main flows through the environments in order.
# dev deploys automatically; qa/staging/production are gated by the required
# reviewers configured on each GitHub Environment (Settings > Environments).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for AWS OIDC
  contents: write # required to push the version/environment tags

jobs:
  # ----------------------------------------------------------------------------
  # Compute the semantic version (GitVersion, trunk-based). It is passed down to
  # every environment, and the commit is tagged with that version.
  # ----------------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.gitversion.outputs.majorMinorPatch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GitVersion needs the full history

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '5.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Tag commit with version
        env:
          SEMVER: ${{ steps.gitversion.outputs.majorMinorPatch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${SEMVER}" >/dev/null; then
            echo "Tag ${SEMVER} already exists, skipping"
          else
            git tag "${SEMVER}"
            git push origin "${SEMVER}"
            echo "Created tag ${SEMVER}"
          fi

  deploy-dev:
    needs: version
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: dev
      env_tag: dev
      channel: alpha
      semver: ${{ needs.version.outputs.semver }}
    secrets: inherit

  deploy-qa:
    needs: [version, deploy-dev]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: qa
      env_tag: qa
      channel: alpha
      semver: ${{ needs.version.outputs.semver }}
    secrets: inherit

  deploy-staging:
    needs: [version, deploy-qa]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: staging
      env_tag: stg
      channel: beta
      semver: ${{ needs.version.outputs.semver }}
    secrets: inherit

  deploy-production:
    needs: [version, deploy-staging]
    uses: ./.github/workflows/_deploy-env.yml
    with:
      environment: production
      env_tag: prod
      channel: stable
      semver: ${{ needs.version.outputs.semver }}
    secrets: inherit
