name: Deploy to environment

# Reusable workflow: builds the shell for a single environment and publishes the
# static bundle to that environment's S3 bucket. Called once per environment by
# deploy.yml. The `environment` input binds the job to the matching GitHub
# Environment, which is where the approval gate and the per-env vars/secrets live.
on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Environment name (dev/qa/staging/production)
        required: true
        type: string
      env_tag:
        description: Git tag tracking the latest commit deployed to this environment
        required: true
        type: string
      channel:
        description: Release channel prefix (alpha/beta/stable)
        required: true
        type: string
      semver:
        description: MAJOR.MINOR.PATCH from GitVersion
        required: true
        type: string

permissions:
  id-token: write
  contents: write # required to move the environment tag

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Compute version tag
        id: ver
        run: |
          tag="${{ inputs.channel }}-${{ inputs.semver }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Version tag: $tag"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Remote origins for this environment (set as Environment secrets).
          VITE_APPOINTMENTS_REMOTE_URL: ${{ secrets.VITE_APPOINTMENTS_REMOTE_URL }}
          VITE_CVC_REMOTE_URL: ${{ secrets.VITE_CVC_REMOTE_URL }}
          VITE_PUBLIC_PATH: ${{ secrets.VITE_PUBLIC_PATH }}
          VITE_APP_VERSION: ${{ steps.ver.outputs.tag }}
        run: npm run build

      - name: Configure AWS credentials (OIDC) (mocked)
        run: |
          echo "MOCK: would assume role ${{ secrets.AWS_DEPLOY_ROLE_ARN }} in region ${{ secrets.AWS_REGION }} via OIDC"
          echo "MOCK: skipping real aws-actions/configure-aws-credentials"

      - name: Deploy to S3 (mocked)
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          VERSION_TAG: ${{ steps.ver.outputs.tag }}
          CHANNEL: ${{ inputs.channel }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          echo "MOCK: deploying environment '$ENVIRONMENT' (channel: $CHANNEL)"
          echo "MOCK: would sync local folder 'dist/' to s3://${S3_BUCKET}/${VERSION_TAG}/"

      - name: Move environment tag to deployed commit
        env:
          ENV_TAG: ${{ inputs.env_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${ENV_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${ENV_TAG}" --force
          echo "Moved tag '${ENV_TAG}' to ${GITHUB_SHA}"
